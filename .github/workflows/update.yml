name: Update CN IP Lists

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 00:00 执行
  workflow_dispatch:       # 允许手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download and split cnip.json
        run: |
          curl -L "https://github.com/DustinWin/ruleset_geodata/raw/refs/heads/sing-box-ruleset/cnip.json" \
               -o cnip.json

          grep -oE '[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+/[0-9]+' cnip.json > cn_ip4.txt
          grep -oE '[0-9a-fA-F]{0,4}(:[0-9a-fA-F]{0,4})+/[0-9]+' cnip.json > cn_ip6.txt

          echo "IPv4: $(wc -l < cn_ip4.txt) 条"
          echo "IPv6: $(wc -l < cn_ip6.txt) 条"

          rm -f cnip.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cn_ip4.txt cn_ip6.txt
          git diff --cached --quiet && echo "无变化，跳过提交" && exit 0
          git commit -m "Auto update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
